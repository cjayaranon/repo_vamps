{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="1.4;url={{ destination }}" />
    <title>VAMPS | Loading</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/colors.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/loading_overlay.css' %}">
</head>
<body class="loading-screen">
    <main class="loading-shell" aria-live="polite">
        <div class="loading-card">
            <div class="loading-badge">VAMPS</div>
            <div class="loading-spinner" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <h1>Preparing your workspace</h1>
            <p>Signing you in as {{ user_position }} and loading your dashboard.</p>
        </div>
    </main>
    <script>
    window.setTimeout(function () {
        window.location.replace("{{ destination|escapejs }}");
    }, 1400);
    </script>
</body>
</html>
